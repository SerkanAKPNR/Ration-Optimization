<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sığır Rasyon Programı</title>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0f1209; --surface:#1a1f10; --surface2:#232b15;
  --border:#2e3a1a; --accent:#8fbe3c; --accent2:#c9e86a;
  --text:#e8f0d0; --text2:#8a9870; --danger:#e05a3a; --warn:#e0a93a;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:"Crimson Pro",serif;min-height:100vh;}

header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;gap:12px;}
header h1{font-size:1.5rem;font-weight:600;color:var(--accent2);}
.subtitle{font-family:"JetBrains Mono",monospace;font-size:0.7rem;color:var(--text2);margin-left:auto;}

.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:12px 20px;cursor:pointer;font-family:"JetBrains Mono",monospace;font-size:0.75rem;color:var(--text2);border-bottom:2px solid transparent;white-space:nowrap;transition:all 0.2s;display:flex;align-items:center;gap:6px;}
.tab:hover{color:var(--text);background:var(--surface2);}
.tab.active{color:var(--accent2);border-bottom-color:var(--accent);background:var(--surface2);}

.main{display:grid;grid-template-columns:320px 1fr;height:calc(100vh - 105px);}
.sidebar{background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;}
.content{overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px;}

.card{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:14px;}
.card-title{font-family:"JetBrains Mono",monospace;font-size:0.7rem;color:var(--accent);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}

label{font-family:"JetBrains Mono",monospace;font-size:0.68rem;color:var(--text2);display:block;margin-bottom:3px;}
input[type=number]{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:4px;font-family:"JetBrains Mono",monospace;font-size:0.78rem;margin-bottom:7px;transition:border-color 0.2s;}
input[type=number]:focus{outline:none;border-color:var(--accent);}

.btn{padding:8px 16px;border:none;border-radius:4px;cursor:pointer;font-family:"JetBrains Mono",monospace;font-size:0.74rem;transition:all 0.2s;}
.btn-primary{background:var(--accent);color:var(--bg);font-weight:500;width:100%;}
.btn-primary:hover{background:var(--accent2);}
.btn-opt{background:linear-gradient(135deg,#1a3a6e,#2a5a9e);color:#a0d4ff;border:1px solid #2a5a9e;font-weight:500;width:100%;}
.btn-opt:hover{background:linear-gradient(135deg,#2a5a9e,#3a7abe);}
.btn-sm{padding:4px 10px;font-size:0.68rem;background:var(--surface);color:var(--text2);border:1px solid var(--border);cursor:pointer;border-radius:4px;font-family:"JetBrains Mono",monospace;}
.btn-sm:hover{color:var(--accent);border-color:var(--accent);}
.btn-sm.active{color:var(--accent2);border-color:var(--accent);background:var(--surface2);}

.hm-table{width:100%;border-collapse:collapse;font-size:0.75rem;}
.hm-table th{font-family:"JetBrains Mono",monospace;font-size:0.62rem;color:var(--text2);text-align:left;padding:4px 4px 8px;border-bottom:1px solid var(--border);white-space:nowrap;}
.hm-table td{padding:3px 4px;border-bottom:1px solid rgba(46,58,26,0.4);vertical-align:middle;}
.hm-table input[type=number]{margin-bottom:0;padding:4px 5px;font-size:0.7rem;}
.hm-name{font-family:"JetBrains Mono",monospace;font-size:0.69rem;color:var(--text);white-space:nowrap;}

.result-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
.rbox{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:10px;text-align:center;}
.rbox .val{font-family:"JetBrains Mono",monospace;font-size:1.05rem;color:var(--accent2);font-weight:500;}
.rbox .lbl{font-size:0.68rem;color:var(--text2);margin-top:2px;font-family:"JetBrains Mono",monospace;}
.rbox.ok{border-color:var(--accent);}
.rbox.warn{border-color:var(--warn);}
.rbox.bad{border-color:var(--danger);}
.cbar{height:5px;border-radius:3px;background:var(--border);margin-top:5px;overflow:hidden;}
.cfill{height:100%;border-radius:3px;transition:width 0.5s;}

.badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:0.64rem;font-family:"JetBrains Mono",monospace;}
.badge-ok{background:rgba(143,190,60,0.15);color:var(--accent);border:1px solid var(--accent);}
.badge-warn{background:rgba(224,169,58,0.15);color:var(--warn);border:1px solid var(--warn);}
.badge-bad{background:rgba(224,90,58,0.15);color:var(--danger);border:1px solid var(--danger);}
.badge-opt{background:rgba(42,90,158,0.2);color:#a0d4ff;border:1px solid #2a5a9e;}

.opt-banner{background:linear-gradient(135deg,rgba(26,58,110,0.3),rgba(42,90,158,0.2));border:1px solid #2a5a9e;border-radius:6px;padding:10px 14px;font-family:"JetBrains Mono",monospace;font-size:0.72rem;color:#a0d4ff;display:flex;align-items:center;gap:8px;}
.warn-banner{background:rgba(224,169,58,0.1);border:1px solid var(--warn);border-radius:6px;padding:10px 14px;font-family:"JetBrains Mono",monospace;font-size:0.72rem;color:var(--warn);display:flex;align-items:center;gap:8px;}

.loading{text-align:center;padding:40px;font-family:"JetBrains Mono",monospace;font-size:0.85rem;color:var(--accent);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

.empty-state{text-align:center;padding:40px 20px;color:var(--text2);font-family:"JetBrains Mono",monospace;font-size:0.8rem;}
.empty-state .icon{font-size:2.5rem;margin-bottom:10px;}
.tag{font-family:"JetBrains Mono",monospace;font-size:0.63rem;color:var(--text2);background:var(--bg);border:1px solid var(--border);padding:2px 6px;border-radius:3px;}
.section-label{font-family:"JetBrains Mono",monospace;font-size:0.65rem;color:var(--text2);margin-bottom:6px;}
.manuel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;}
.mod-toggle{display:flex;gap:4px;margin-bottom:10px;}

@media(max-width:768px){
  .main{grid-template-columns:1fr;height:auto;}
  .sidebar{border-right:none;border-bottom:1px solid var(--border);}
  .result-grid{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>
<body>
<header>
  <span>🐄</span>
  <h1>Sığır Rasyon Programı</h1>
  <div class="subtitle">v2.0 — Otomatik Optimizasyon</div>
</header>
<div class="tabs" id="tabBar"></div>
<div style="background:var(--surface);border-bottom:1px solid var(--border);display:flex;gap:0">
  <div id="mainTab_rasyon" onclick="setTab('rasyon')" style="padding:8px 20px;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:0.72rem;color:var(--text2);border-bottom:2px solid transparent;transition:all 0.2s">🌾 Rasyon</div>
  <div id="mainTab_maliyet" onclick="setTab('maliyet')" style="padding:8px 20px;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:0.72rem;color:var(--text2);border-bottom:2px solid transparent;transition:all 0.2s">💰 Maliyet Analizi</div>
</div>
<div class="main" id="mainArea">
  <div class="sidebar" id="sidebar"></div>
  <div class="content" id="content"></div>
</div>
</div>

<script>
// ── VERİ ────────────────────────────────────────────────────────────────
const GRUPLAR = [
  { id:'sut', isim:'Süt İneği', icon:'🐄', aciklama:'Laktasyondaki inek',
    ihtiyac:{
      km: {label:'Kuru Madde (kg/gün)', val:20},
      hp: {label:'Ham Protein (% KM)',  val:16,  isMin:true},
      me: {label:'ME (MJ/kg KM)',       val:11.5, isMin:true},
      ndf:{label:'NDF (% KM)',          val:32,  isMax:true},
      nis:{label:'Nişasta (% KM)',      val:25,  isMin:true},
    },
    ekBilgi:[{label:'Canlı Ağırlık (kg)',key:'ca',val:600},{label:'Süt Verimi (lt/gün)',key:'sut',val:25},{label:'Süt Yağı (%)',key:'yag',val:3.8}]
  },
  { id:'kuru', isim:'Kuru İnek', icon:'🐄', aciklama:'Kuruda bekleyen inek',
    ihtiyac:{
      km: {label:'Kuru Madde (kg/gün)', val:11},
      hp: {label:'Ham Protein (% KM)',  val:12,  isMin:true},
      me: {label:'ME (MJ/kg KM)',       val:9.5, isMin:true},
      ndf:{label:'NDF (% KM)',          val:40,  isMax:true},
      nis:{label:'Nişasta (% KM)',      val:18,  isMin:true},
    },
    ekBilgi:[{label:'Canlı Ağırlık (kg)',key:'ca',val:620},{label:'Kuru Süre (gün)',key:'gun',val:60}]
  },
  { id:'duve', isim:'Düve', icon:'🐮', aciklama:'Genç dişi sığır',
    ihtiyac:{
      km: {label:'Kuru Madde (kg/gün)', val:8},
      hp: {label:'Ham Protein (% KM)',  val:14,  isMin:true},
      me: {label:'ME (MJ/kg KM)',       val:10.0,isMin:true},
      ndf:{label:'NDF (% KM)',          val:36,  isMax:true},
      nis:{label:'Nişasta (% KM)',      val:22,  isMin:true},
    },
    ekBilgi:[{label:'Canlı Ağırlık (kg)',key:'ca',val:350},{label:'Günlük Artış (g/gün)',key:'gain',val:700}]
  },
  { id:'buzagi', isim:'Buzağı', icon:'🍼', aciklama:'Büyüme dönemindeki buzağı',
    ihtiyac:{
      km: {label:'Kuru Madde (kg/gün)', val:3},
      hp: {label:'Ham Protein (% KM)',  val:18,  isMin:true},
      me: {label:'ME (MJ/kg KM)',       val:12.0,isMin:true},
      ndf:{label:'NDF (% KM)',          val:25,  isMax:true},
      nis:{label:'Nişasta (% KM)',      val:28,  isMin:true},
    },
    ekBilgi:[{label:'Canlı Ağırlık (kg)',key:'ca',val:80},{label:'Yaş (hafta)',key:'yas',val:8},{label:'Günlük Artış (g/gün)',key:'gain',val:500}]
  },
  { id:'besi', isim:'Besi', icon:'🥩', aciklama:'Besi sığırı',
    ihtiyac:{
      km: {label:'Kuru Madde (kg/gün)', val:9},
      hp: {label:'Ham Protein (% KM)',  val:13,  isMin:true},
      me: {label:'ME (MJ/kg KM)',       val:11.0,isMin:true},
      ndf:{label:'NDF (% KM)',          val:30,  isMax:true},
      nis:{label:'Nişasta (% KM)',      val:30,  isMin:true},
    },
    ekBilgi:[{label:'Canlı Ağırlık (kg)',key:'ca',val:300},{label:'Hedef Ağırlık (kg)',key:'hedef',val:500},{label:'Günlük Artış (g/gün)',key:'gain',val:1200}]
  },
];

const HM0 = [
  {isim:'Mısır Silajı',    hp:8.5, me:10.2,ndf:42,nis:3, km:33,fiyat:800,  min:0,max:0},
  {isim:'Yonca Kuru Otu',  hp:18.0,me:9.5, ndf:38,nis:2, km:90,fiyat:4500, min:0,max:0},
  {isim:'Mısır Danesi',    hp:9.0, me:14.0,ndf:10,nis:65,km:88,fiyat:9500, min:0,max:0},
  {isim:'Arpa Danesi',     hp:11.5,me:13.0,ndf:18,nis:52,km:88,fiyat:8200, min:0,max:0},
  {isim:'Soya Küspesi',    hp:44.0,me:13.2,ndf:12,nis:4, km:89,fiyat:18000,min:0,max:0},
  {isim:'Pamuk Tohumu K.', hp:40.0,me:11.5,ndf:30,nis:2, km:90,fiyat:14000,min:0,max:0},
  {isim:'Buğday Kepeği',   hp:16.5,me:11.0,ndf:35,nis:18,km:88,fiyat:7000, min:0,max:0},
  {isim:'Melas',           hp:5.0, me:12.5,ndf:0, nis:48,km:72,fiyat:6000, min:0,max:0},
  {isim:'Ayçiçek Küsp.',   hp:34.0,me:10.5,ndf:28,nis:3, km:89,fiyat:11000,min:0,max:0},
  {isim:'Kuru Pancar Pul.',hp:10.0,me:12.0,ndf:45,nis:1, km:90,fiyat:8500, min:0,max:0},
];

// ── STATE ───────────────────────────────────────────────────────────────
let S = {
  aktif: 'sut',
  tab: 'rasyon', // 'rasyon' | 'maliyet'
  girismod: 'taze', // 'taze' | 'km'
  sutFiyat: 26,
  suruBasi: 100
  hm: JSON.parse(JSON.stringify(HM0)),
  iht: {}, ek: {}, miktar: {}
};
GRUPLAR.forEach(g => {
  S.iht[g.id] = {};
  Object.entries(g.ihtiyac).forEach(([k,v]) => S.iht[g.id][k] = v.val);
  S.ek[g.id] = {};
  g.ekBilgi.forEach(e => S.ek[g.id][e.key] = e.val);
  S.miktar[g.id] = new Array(HM0.length).fill(0);
});

// ── YARDIMCI ────────────────────────────────────────────────────────────
function G() { return GRUPLAR.find(g => g.id === S.aktif); }

function nutrients(miktarlar) {
  let KM=0,HP=0,ME=0,NDF=0,NIS=0,MAL=0,TAZ=0;
  miktarlar.forEach((t,i) => {
    const h = S.hm[i], k = t*(h.km/100);
    KM+=k; HP+=k*(h.hp/100); ME+=k*h.me; NDF+=k*(h.ndf/100); NIS+=k*((h.nis||0)/100);
    MAL+=t*(h.fiyat/1000); TAZ+=t;
  });
  return {
    KM, HP, ME, NDF, NIS, MAL, TAZ,
    hp_pct:  KM>0?(HP/KM)*100:0,
    me_val:  KM>0?ME/KM:0,
    ndf_pct: KM>0?(NDF/KM)*100:0,
    nis_pct: KM>0?(NIS/KM)*100:0,
  };
}

function calcNT(x, hm) {
  let KM=0,HP=0,ME=0,NDF=0,NIS=0;
  x.forEach((t,i) => {
    const k=t*(hm[i].km/100);
    KM+=k; HP+=k*(hm[i].hp/100); ME+=k*hm[i].me;
    NDF+=k*(hm[i].ndf/100); NIS+=k*((hm[i].nis||0)/100);
  });
  return {
    KM,
    hp_pct:  KM>0?(HP/KM)*100:0,
    me_val:  KM>0?ME/KM:0,
    ndf_pct: KM>0?(NDF/KM)*100:0,
    nis_pct: KM>0?(NIS/KM)*100:0,
  };
}

function durum(val, hedef, tol) {
  const f = Math.abs(val-hedef)/hedef*100;
  return f<=tol?'ok':f<=tol*2.5?'warn':'bad';
}

function cbar(val, hedef) {
  const pct = Math.min((val/(hedef*1.5))*100,100);
  const c = Math.abs(val-hedef)/hedef<0.08?'var(--accent)':Math.abs(val-hedef)/hedef<0.2?'var(--warn)':'var(--danger)';
  return `<div class="cbar"><div class="cfill" style="width:${pct}%;background:${c}"></div></div>`;
}

// ── RENDER ──────────────────────────────────────────────────────────────
function render() { renderTabs(); renderMainArea(); }

function renderMainArea() {
  // Tab aktif stilleri
  ['rasyon','maliyet'].forEach(t => {
    const el = document.getElementById('mainTab_'+t);
    if (!el) return;
    if (S.tab===t) {
      el.style.color='var(--accent2)';
      el.style.borderBottomColor='var(--accent)';
      el.style.background='var(--surface2)';
    } else {
      el.style.color='var(--text2)';
      el.style.borderBottomColor='transparent';
      el.style.background='';
    }
  });

  if (S.tab==='maliyet') {
    document.getElementById('mainArea').innerHTML = renderMaliyet();
  } else {
    document.getElementById('mainArea').innerHTML = `
      <div class="sidebar" id="sidebar"></div>
      <div class="content" id="content"></div>
    `;
    renderSidebar();
    renderContent();
  }
}

function renderTabs() {
  document.getElementById('tabBar').innerHTML = GRUPLAR.map(g =>
    `<div class="tab ${S.aktif===g.id?'active':''}" onclick="setGrup('${g.id}')">${g.icon} ${g.isim}</div>`
  ).join('');
}

function setGrup(id) { S.aktif=id; render(); }
function setTab(tab) { S.tab=tab; renderMainArea(); }

function renderSidebar() {
  const g = G();
  document.getElementById('sidebar').innerHTML = `
    <div class="card">
      <div class="card-title">${g.icon} ${g.aciklama}</div>
      ${g.ekBilgi.map(e=>`
        <label>${e.label}</label>
        <input type="number" value="${S.ek[g.id][e.key]}" step="any"
          onchange="S.ek['${g.id}']['${e.key}']=+this.value">
      `).join('')}
    </div>

    <div class="card">
      <div class="card-title">🎯 Besin İhtiyaçları</div>
      <div class="section-label">Düzenleyebilirsiniz</div>
      ${Object.entries(g.ihtiyac).map(([k,m])=>`
        <label>${m.label} ${m.isMin?'(≥)':m.isMax?'(≤)':'(hedef)'}</label>
        <input type="number" value="${S.iht[g.id][k]}" step="0.01"
          onchange="S.iht['${g.id}']['${k}']=+this.value">
      `).join('')}
    </div>

    <div class="card" style="border-color:#2a5a9e;background:rgba(26,58,110,0.12)">
      <div class="card-title" style="color:#a0d4ff">⚡ Otomatik Optimizasyon</div>
      <div style="font-size:0.8rem;color:var(--text2);margin-bottom:10px;line-height:1.6">
        Min/Max sınırlarını ayarlayın, program <strong style="color:#a0d4ff">optimum</strong> rasyonu bulsun.
      </div>
      <button class="btn btn-opt" onclick="otomatik()">🎯 Optimum Rasyonu Hesapla</button>
    </div>

    <button class="btn btn-primary" onclick="manuel()">⚙️ Manuel Hesapla</button>
    <button class="btn btn-sm" onclick="sifirla()" style="width:100%;margin-top:6px">🔄 Miktarları Sıfırla</button>
  `;
}

function renderContent() {
  const g = G();
  document.getElementById('content').innerHTML = `
    <div class="card">
      <div class="card-title">
        <span>🌾 Hammaddeler</span>
        <button class="btn btn-sm" onclick="hmEkle()">+ Ekle</button>
      </div>
      <div style="overflow-x:auto">
        <table class="hm-table">
          <thead><tr>
            <th>Hammadde</th>
            <th>HP %</th><th>ME MJ</th><th>NDF %</th><th>Niş %</th><th>KM %</th><th>₺/ton</th>
            <th style="color:var(--warn)">Min kg</th>
            <th style="color:var(--accent)">Max kg</th>
            <th></th>
          </tr></thead>
          <tbody>
            ${S.hm.map((h,i)=>`<tr>
              <td><span class="hm-name">${h.isim}</span></td>
              <td><input type="number" value="${h.hp}"    step="0.1"  onchange="S.hm[${i}].hp=+this.value"></td>
              <td><input type="number" value="${h.me}"    step="0.1"  onchange="S.hm[${i}].me=+this.value"></td>
              <td><input type="number" value="${h.ndf}"   step="0.1"  onchange="S.hm[${i}].ndf=+this.value"></td>
              <td><input type="number" value="${h.nis||0}" step="0.1" onchange="S.hm[${i}].nis=+this.value"></td>
              <td><input type="number" value="${h.km}"    step="0.1"  onchange="S.hm[${i}].km=+this.value"></td>
              <td><input type="number" value="${h.fiyat}" step="100"  onchange="S.hm[${i}].fiyat=+this.value"></td>
              <td><input type="number" value="${h.min}"   step="0.1"  onchange="S.hm[${i}].min=+this.value" style="border-color:rgba(224,169,58,0.4)"></td>
              <td><input type="number" value="${h.max}"   step="0.1"  onchange="S.hm[${i}].max=+this.value" style="border-color:rgba(143,190,60,0.4)"></td>
              <td><button class="btn btn-sm" onclick="hmSil(${i})" style="color:var(--danger)">✕</button></td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:0.63rem;color:var(--text2);margin-top:8px">
        ⓘ Max = 0 → sınırsız
      </div>
    </div>

    <div class="card">
      <div class="card-title">
        <span>⚖️ Manuel Miktar Girişi</span>
        <div style="display:flex;gap:4px">
          <button class="btn btn-sm ${S.girismod==='taze'?'active':''}"
            onclick="S.girismod='taze';renderContent()"
            style="${S.girismod==='taze'?'color:var(--accent2);border-color:var(--accent)':''}">Taze kg</button>
          <button class="btn btn-sm ${S.girismod==='km'?'active':''}"
            onclick="S.girismod='km';renderContent()"
            style="${S.girismod==='km'?'color:var(--accent2);border-color:var(--accent)':''}">KM kg</button>
        </div>
      </div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:0.65rem;color:var(--text2);margin-bottom:10px">
        ${S.girismod==='taze'?'Taze ağırlık giriyorsunuz — program KM'ye çeviriyor':'KM bazında giriyorsunuz — program taze ağırlığa çeviriyor'}
      </div>
      <div class="manuel-grid">
        ${S.hm.map((h,i)=>{
          const displayVal = S.girismod==='taze'

}

function setMiktar(grupId, i, val) {
  if (S.girismod === 'taze') {
    S.miktar[grupId][i] = val;
  } else {
    const km_pct = S.hm[i].km / 100;
    S.miktar[grupId][i] = km_pct > 0 ? val / km_pct : 0;
  }
}

function sifirla() {
  const g = G();
  S.miktar[g.id] = new Array(S.hm.length).fill(0);
  renderContent();
}

function hmSil(i) {
  if (!confirm(`"${S.hm[i].isim}" silinsin mi?`)) return;
  S.hm.splice(i,1);
  Object.keys(S.miktar).forEach(gid => S.miktar[gid].splice(i,1));
  render();
}

function hmEkle() {
  const isim = prompt('Hammadde adı:');
  if (!isim) return;
  S.hm.push({isim,hp:10,me:10,ndf:20,nis:10,km:88,fiyat:5000,min:0,max:0});
  Object.keys(S.miktar).forEach(gid => S.miktar[gid].push(0));

function manuel() {

// ── OTOMATİK OPTİMİZASYON ───────────────────────────────────────────────
// Greedy adım adım:
// 1. Ucuz hammaddelerden KM hedefini doldur
// 2. HP eksikse yüksek proteinli hammaddeleri artır
// 3. ME eksikse yüksek enerjili hammaddeleri artır
// 4. NDF fazlaysa yüksek NDF'li hammaddeleri azalt
// 5. Nişasta eksikse yüksek nişastalı hammaddeleri artır

function otomatik() {
  document.getElementById('sonuclar').innerHTML =
    '<div class="card"><div class="loading">🧮 Optimum rasyon hesaplanıyor...</div></div>';

  setTimeout(() => {
    const g = G(), iht = S.iht[g.id], hm = S.hm, n = hm.length;
    const TARGET = iht.km, MIN_HP = iht.hp, MIN_ME = iht.me, MAX_NDF = iht.ndf, MIN_NIS = iht.nis||0;
    const maxArr = hm.map(h => h.max === 0 ? 9999 : h.max);
    const minArr = hm.map(h => h.min);

    // ADIM 1: KM hedefini ucuz hammaddelerle doldur
    let x = [...minArr];
    let kmLeft = TARGET - calcNT(x, hm).KM;
    const byPrice = hm.map((_,i)=>i).sort((a,b)=>hm[a].fiyat-hm[b].fiyat);
    for (const i of byPrice) {
      if (kmLeft <= 0.001) break;
      const tazePer = hm[i].km/100;
      if (tazePer <= 0) continue;
      const canAdd = Math.min((maxArr[i]-x[i]), kmLeft/tazePer);
      x[i] += canAdd;
      kmLeft -= canAdd * tazePer;
    }

    // ADIM 2: HP düzelt
    for (let iter=0; iter<1000; iter++) {
      const nt = calcNT(x, hm);
      if (nt.hp_pct >= MIN_HP - 0.3) break;
      // En yüksek HP'li, artırılabilir hammadde
      let bestI=-1, bestHP=-1;
      for (let i=0;i<n;i++) {
        if (x[i]<maxArr[i] && hm[i].hp>bestHP) { bestHP=hm[i].hp; bestI=i; }
      }
      if (bestI<0) break;
      const add = Math.min(0.3, maxArr[bestI]-x[bestI]);
      x[bestI] += add;
      // KM'yi koru: en düşük HP'li ucuz hammaddeden çıkar
      let kmRem = add*(hm[bestI].km/100);
      for (const i of byPrice) {
        if (kmRem<=0.001) break;
        if (i===bestI || x[i]<=minArr[i] || hm[i].hp>=MIN_HP) continue;
        const rem = Math.min(x[i]-minArr[i], kmRem/(hm[i].km/100));
        x[i]-=rem; kmRem-=rem*(hm[i].km/100);
      }
    }

    // ADIM 3: ME düzelt
    for (let iter=0; iter<1000; iter++) {
      const nt = calcNT(x, hm);
      if (nt.me_val >= MIN_ME - 0.2) break;
      let bestI=-1, bestME=-1;
      for (let i=0;i<n;i++) {
        if (x[i]<maxArr[i] && hm[i].me>bestME) { bestME=hm[i].me; bestI=i; }
      }
      if (bestI<0) break;
      const add = Math.min(0.3, maxArr[bestI]-x[bestI]);
      x[bestI] += add;
      let kmRem = add*(hm[bestI].km/100);
      const byME = hm.map((_,i)=>i).sort((a,b)=>hm[a].me-hm[b].me);
      for (const i of byME) {
        if (kmRem<=0.001) break;
        if (i===bestI || x[i]<=minArr[i] || hm[i].me>=MIN_ME) continue;
        const rem = Math.min(x[i]-minArr[i], kmRem/(hm[i].km/100));
        x[i]-=rem; kmRem-=rem*(hm[i].km/100);
      }
    }

    // ADIM 4: NDF düzelt
    for (let iter=0; iter<1000; iter++) {
      const nt = calcNT(x, hm);
      if (nt.ndf_pct <= MAX_NDF + 0.5) break;
      let worstI=-1, worstNDF=-1;
      for (let i=0;i<n;i++) {
        if (x[i]>minArr[i] && hm[i].ndf>worstNDF) { worstNDF=hm[i].ndf; worstI=i; }
      }
      if (worstI<0) break;
      const rem = Math.min(0.3, x[worstI]-minArr[worstI]);
      x[worstI] -= rem;
      let kmAdd = rem*(hm[worstI].km/100);
      const byNDF = hm.map((_,i)=>i).sort((a,b)=>hm[a].ndf-hm[b].ndf);
      for (const i of byNDF) {
        if (kmAdd<=0.001) break;
        if (i===worstI || x[i]>=maxArr[i]) continue;
        const add = Math.min(maxArr[i]-x[i], kmAdd/(hm[i].km/100));
        x[i]+=add; kmAdd-=add*(hm[i].km/100);
      }
    }

    // ADIM 5: Nişasta düzelt
    if (MIN_NIS > 0) {
      for (let iter=0; iter<1000; iter++) {
        const nt = calcNT(x, hm);
        if (nt.nis_pct >= MIN_NIS - 0.5) break;
        let bestI=-1, bestNIS=-1;
        for (let i=0;i<n;i++) {
          if (x[i]<maxArr[i] && (hm[i].nis||0)>bestNIS) { bestNIS=hm[i].nis||0; bestI=i; }
        }
        if (bestI<0) break;
        const add = Math.min(0.3, maxArr[bestI]-x[bestI]);
        x[bestI] += add;
        let kmRem = add*(hm[bestI].km/100);
        const byNIS = hm.map((_,i)=>i).sort((a,b)=>(hm[a].nis||0)-(hm[b].nis||0));
        for (const i of byNIS) {
          if (kmRem<=0.001) break;
          if (i===bestI || x[i]<=minArr[i] || (hm[i].nis||0)>=MIN_NIS) continue;
          const rem = Math.min(x[i]-minArr[i], kmRem/(hm[i].km/100));
          x[i]-=rem; kmRem-=rem*(hm[i].km/100);
        }
      }
    }

    // State'e yaz
    S.miktar[G().id] = x;
    const oz = nutrients(x);
    const iht2 = S.iht[G().id];
    const yaklaşık =
      Math.abs(oz.KM-iht2.km) > iht2.km*0.08 ||
      oz.hp_pct  < iht2.hp  - 1.0 ||
      oz.me_val  < iht2.me  - 0.5 ||
      oz.ndf_pct > iht2.ndf + 3   ||
      (iht2.nis>0 && oz.nis_pct < iht2.nis - 2);
    renderContent();
    showSonuc(oz, x, true, yaklaşık);
  }, 60);
}

              </div>
              <div class="rbox" style="border-color:\${karRenk}">
                <div class="val" style="color:\${karRenk}">\${(suruAylikKar/1000).toFixed(0)} K₺</div>
                <div class="lbl">Aylık Brüt Kar</div>
              </div>
            </div>
          </div>

          <div class="card">
            <div class="card-title">📋 Hammadde Maliyet Dağılımı</div>
            \${satirlar.map(r => {
              const pct = oz.MAL > 0 ? r.maliyet/oz.MAL*100 : 0;
              return \`<div style="display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--border)">
                <span style="flex:1;font-size:0.85rem">\${r.isim}</span>
                <span style="font-family:'JetBrains Mono',monospace;font-size:0.78rem;color:var(--text2)">\${r.taze.toFixed(1)} kg</span>
                <span style="font-family:'JetBrains Mono',monospace;font-size:0.78rem;color:var(--warn)">\${r.maliyet.toFixed(0)} ₺</span>
                <span style="font-family:'JetBrains Mono',monospace;font-size:0.7rem;width:45px;text-align:right;color:var(--text2)">%\${pct.toFixed(1)}</span>
                <div style="width:80px;height:6px;background:var(--border);border-radius:3px;overflow:hidden">
                  <div style="width:\${pct}%;height:100%;background:var(--warn);border-radius:3px"></div>
                </div>
              </div>\`;
            }).join('')}
            <div style="display:flex;justify-content:space-between;padding:8px 0;margin-top:4px;border-top:2px solid var(--border)">
              <span style="font-weight:600;color:var(--accent2)">TOPLAM</span>
              <span style="font-family:'JetBrains Mono',monospace;color:var(--warn);font-weight:600">\${oz.MAL.toFixed(0)} ₺/gün/baş</span>
            </div>
          </div>
        \`}
      </div>
    </div>
  \`;
}

render();
</script>
</body>
</html>
