<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sığır Rasyon Programı v2.0</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #060f09;
  --surf:      #0b1a0e;
  --surf2:     #0f2214;
  --surf3:     #152c1a;
  --border:    #1a3d22;
  --border2:   #224f2c;
  --acc:       #276933;
  --acc2:      #338942;
  --glow:      #4dc962;
  --text:      #dff0e3;
  --muted:     #6b9e7a;
  --dim:       #37634a;
  --warn:      #e8a523;
  --warn-bg:   #251a04;
  --err:       #e05454;
  --err-bg:    #260a0a;
  --ok:        #3dc26b;
  --ok-bg:     #0a2014;
  --gold:      #c9a227;
  --gold2:     #e8c040;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Crimson Pro',Georgia,serif;min-height:100vh;font-size:15px;line-height:1.5}

/* ─── HEADER ─── */
.hdr{background:var(--surf);border-bottom:2px solid var(--border2);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
.hdr-title{font-size:21px;font-weight:700;color:var(--glow);letter-spacing:.3px}
.hdr-title small{color:var(--muted);font-weight:400;font-size:13px;margin-left:6px}
.hdr-badge{font-family:'JetBrains Mono',monospace;font-size:11px;background:var(--surf3);border:1px solid var(--border2);color:var(--muted);padding:3px 8px;border-radius:4px}

/* ─── TABS ─── */
.tabs{background:var(--surf);border-bottom:1px solid var(--border);padding:0 14px;display:flex;gap:2px;overflow-x:auto}
.tabs::-webkit-scrollbar{height:3px}
.tabs::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.tab-btn{background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);font-family:'Crimson Pro',serif;font-size:15px;font-weight:600;padding:9px 14px;cursor:pointer;white-space:nowrap;transition:color .15s,border-color .15s}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--glow);border-bottom-color:var(--glow)}
.tab-btn.tm{color:var(--gold)}
.tab-btn.tm.active{color:var(--gold2);border-bottom-color:var(--gold2)}

/* ─── CONTENT ─── */
.wrap{padding:14px;max-width:1440px;margin:0 auto}
.tc{display:none}
.tc.active{display:block;animation:fi .15s ease}
@keyframes fi{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}

/* ─── REQUIREMENTS PANEL ─── */
.reqs{background:var(--surf2);border:1px solid var(--border);border-radius:8px;padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.reqs-lbl{font-size:12px;font-weight:600;color:var(--muted);letter-spacing:1px;text-transform:uppercase;white-space:nowrap}
.req-items{display:flex;gap:10px;flex-wrap:wrap;flex:1}
.req-item{display:flex;flex-direction:column;gap:3px}
.req-key{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px}
.req-in{background:var(--surf3);border:1px solid var(--border2);color:var(--glow);font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600;padding:5px 8px;border-radius:4px;width:85px;text-align:right}
.req-in:focus{outline:none;border-color:var(--acc2)}

/* ─── SECTION CARD ─── */
.card{background:var(--surf2);border:1px solid var(--border);border-radius:8px;margin-bottom:14px;overflow:hidden}
.card-hd{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;user-select:none}
.card-hd h3{font-size:12px;font-weight:600;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.card-hd .arr{color:var(--muted);font-size:11px;transition:transform .2s}
.card-hd .arr.open{transform:rotate(180deg)}
.card-body{overflow:hidden}
.card-body.coll{display:none}
.card-foot{padding:8px 14px;border-top:1px solid var(--border);display:flex;gap:8px}

/* ─── TABLES ─── */
.twrap{overflow-x:auto}
.twrap::-webkit-scrollbar{height:4px}
.twrap::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

table.dt{width:100%;border-collapse:collapse;font-size:13px}
table.dt th{background:var(--surf3);color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.4px;padding:7px 10px;text-align:right;border-bottom:1px solid var(--border2);white-space:nowrap}
table.dt th.lft,table.dt td.lft{text-align:left}
table.dt td{padding:5px 10px;border-bottom:1px solid var(--border);text-align:right;font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text)}
table.dt td.nm{text-align:left;font-family:'Crimson Pro',serif;font-size:14px}
table.dt tr:hover td{background:var(--surf3)}
table.dt tr:last-child td{border-bottom:none}

.ci{background:transparent;border:none;color:inherit;font-family:inherit;font-size:inherit;text-align:right;width:100%;min-width:52px;padding:2px 3px;border-radius:3px}
.ci.nm{text-align:left;min-width:130px}
.ci:focus{outline:none;background:var(--surf);border:1px solid var(--acc)}
.ci.err{color:var(--err)}

/* ─── BUTTONS ─── */
.btn{font-family:'Crimson Pro',serif;font-size:13px;font-weight:600;padding:6px 13px;border-radius:5px;cursor:pointer;border:none;transition:all .15s}
.btn-g{background:transparent;color:var(--muted);border:1px solid var(--border2)}
.btn-g:hover{color:var(--text);border-color:var(--muted)}
.btn-del{background:none;border:1px solid transparent;color:var(--err);font-size:11px;width:22px;height:22px;border-radius:3px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:.5;transition:opacity .15s}
.btn-del:hover{opacity:1;background:var(--err-bg);border-color:var(--err)}
.btn-opt{background:linear-gradient(135deg,var(--acc) 0%,#173d20 100%);color:var(--glow);border:1px solid var(--acc2);font-size:14px;padding:9px 18px;box-shadow:0 0 14px rgba(39,105,51,.35)}
.btn-opt:hover{background:linear-gradient(135deg,var(--acc2) 0%,var(--acc) 100%);box-shadow:0 0 20px rgba(51,137,66,.45)}
.btn-clr{background:transparent;color:var(--muted);border:1px solid var(--border);font-size:13px}
.btn-clr:hover{border-color:var(--err);color:var(--err)}

/* ─── RATION CONTROLS ─── */
.rctl{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.rctl h3{font-size:12px;font-weight:600;color:var(--muted);letter-spacing:1px;text-transform:uppercase;flex:1}
.tgl{display:flex;background:var(--surf3);border:1px solid var(--border2);border-radius:5px;overflow:hidden}
.tgl button{background:none;border:none;color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:11px;padding:5px 11px;cursor:pointer;transition:all .12s}
.tgl button.act{background:var(--acc);color:#fff}

.ra{background:var(--surf3);border:1px solid var(--border2);color:var(--glow);font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500;padding:4px 7px;border-radius:4px;width:76px;text-align:right;transition:border-color .12s}
.ra:focus{outline:none;border-color:var(--acc2)}
.ra.hv{border-color:var(--acc)}

/* ─── RESULTS ─── */
.banner{padding:8px 14px;font-size:14px;font-weight:600;display:none;border-bottom:1px solid var(--border)}
.banner.opt{display:block;background:var(--ok-bg);color:var(--ok);border-color:#164a25}
.banner.apr{display:block;background:var(--warn-bg);color:var(--warn);border-color:#3a2504}

table.rt{width:100%;border-collapse:collapse}
table.rt th{background:var(--surf3);color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;text-transform:uppercase;padding:7px 12px;text-align:right;border-bottom:1px solid var(--border2)}
table.rt th.lft{text-align:left}
table.rt td{padding:7px 12px;text-align:right;font-family:'JetBrains Mono',monospace;font-size:14px;border-bottom:1px solid var(--border)}
table.rt td.nm{text-align:left;font-family:'Crimson Pro',serif;font-size:15px}
table.rt td.u{color:var(--dim);font-size:11px}
table.rt tr:last-child td{border-bottom:none}
.dpos{color:var(--ok)}
.dneg{color:var(--err)}
.dok{color:var(--muted)}
.sok{color:var(--ok)}
.swrn{color:var(--warn)}
.serr{color:var(--err)}
.crow td{background:var(--surf3);font-weight:600;font-size:13px}
.res-hd{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.res-hd h3{font-size:12px;font-weight:600;color:var(--muted);letter-spacing:1px;text-transform:uppercase;flex:1}
.chip{display:inline-flex;align-items:center;background:var(--surf3);border:1px solid var(--border);border-radius:20px;padding:2px 9px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--gold)}

/* ─── MALIYET TAB ─── */
.mgrid{display:grid;grid-template-columns:300px 1fr;gap:14px;margin-bottom:14px}
@media(max-width:760px){.mgrid{grid-template-columns:1fr}}
.form-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;gap:10px}
.form-lbl{font-size:15px;color:var(--text)}
.form-in{background:var(--surf3);border:1px solid var(--border2);color:var(--glow);font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600;padding:6px 9px;border-radius:4px;width:110px;text-align:right}
.form-in:focus{outline:none;border-color:var(--acc2)}
.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:14px}
@media(max-width:600px){.kpis{grid-template-columns:1fr 1fr}}
.kpi{background:var(--surf2);border:1px solid var(--border);border-radius:8px;padding:13px}
.kpi-lbl{font-size:11px;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.kpi-val{font-family:'JetBrains Mono',monospace;font-size:19px;font-weight:600;color:var(--text)}
.kpi-val.pos{color:var(--ok)}
.kpi-val.neg{color:var(--err)}
.kpi-val.gld{color:var(--gold)}
.kpi-sub{font-size:11px;color:var(--dim);margin-top:2px}
.bar-row{display:flex;align-items:center;gap:9px;margin-bottom:7px}
.bar-lbl{font-family:'Crimson Pro',serif;font-size:13px;color:var(--text);width:145px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-trk{flex:1;height:16px;background:var(--surf3);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--acc) 0%,var(--acc2) 100%);border-radius:3px;transition:width .3s}
.bar-pct{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);width:42px;text-align:right}
.bar-val{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--gold);width:65px;text-align:right}
.empty{padding:24px;text-align:center;color:var(--dim);font-style:italic}
.info-box{margin-top:10px;padding:9px;background:var(--surf3);border-radius:5px;font-size:13px;color:var(--muted);line-height:1.4}

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--surf)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--acc)}

/* ─── TOTAL ROW ─── */
.trow td{background:var(--surf3);color:var(--glow);font-weight:600;font-size:13px;border-top:1px solid var(--border2)}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-title">🐄 Sığır Rasyon Programı <small>v2.0</small></div>
  <div class="hdr-badge">NRC · TR</div>
</div>

<div class="tabs" id="tabs">
  <button class="tab-btn active" data-g="sut">🐄 Süt İneği</button>
  <button class="tab-btn" data-g="kuru">Kuru İnek</button>
  <button class="tab-btn" data-g="duve">Düve</button>
  <button class="tab-btn" data-g="buzagi">Buzağı</button>
  <button class="tab-btn" data-g="besi">Besi</button>
  <button class="tab-btn tm" data-g="maliyet">💰 Maliyet Analizi</button>
</div>

<div class="wrap">
  <div id="tc-sut" class="tc active"></div>
  <div id="tc-kuru" class="tc"></div>
  <div id="tc-duve" class="tc"></div>
  <div id="tc-buzagi" class="tc"></div>
  <div id="tc-besi" class="tc"></div>
  <div id="tc-maliyet" class="tc"></div>
</div>

<script>
// ═══════════════════════ DATA ═══════════════════════

const GROUPS = ['sut','kuru','duve','buzagi','besi'];

const DEF_REQS = {
  sut:    {km:22.0, hp:16.5, me:2.70, ndf:28.0, nisasta:25.0},
  kuru:   {km:12.0, hp:12.0, me:2.30, ndf:38.0, nisasta:15.0},
  duve:   {km: 8.0, hp:14.0, me:2.50, ndf:32.0, nisasta:20.0},
  buzagi: {km: 4.0, hp:18.0, me:2.80, ndf:20.0, nisasta:25.0},
  besi:   {km:10.0, hp:13.0, me:2.60, ndf:25.0, nisasta:30.0}
};

let NID = 13;
const DEF_FEEDS = [
  {id:1,  name:'Mısır Silajı',      hp:8.5,  me:2.50, ndf:43.0, nisasta:25.0, km:30.0, price:1500,  min:0,   max:0  },
  {id:2,  name:'Buğday Samanı',     hp:4.0,  me:1.80, ndf:78.0, nisasta:3.0,  km:88.0, price:800,   min:0,   max:3  },
  {id:3,  name:'Yonca Kuru Otu',    hp:18.0, me:2.30, ndf:40.0, nisasta:3.0,  km:88.0, price:4500,  min:0,   max:0  },
  {id:4,  name:'Mısır Tanesi',      hp:9.0,  me:3.20, ndf:9.0,  nisasta:72.0, km:87.0, price:7000,  min:0,   max:0  },
  {id:5,  name:'Arpa',              hp:12.0, me:3.00, ndf:18.0, nisasta:57.0, km:87.0, price:6500,  min:0,   max:0  },
  {id:6,  name:'Soya Küspesi',      hp:48.0, me:3.00, ndf:9.0,  nisasta:5.0,  km:88.0, price:18000, min:0,   max:0  },
  {id:7,  name:'Pamuk T. Küspesi',  hp:44.0, me:2.60, ndf:28.0, nisasta:3.0,  km:90.0, price:14000, min:0,   max:0  },
  {id:8,  name:'Buğday Kepeği',     hp:16.0, me:2.50, ndf:38.0, nisasta:15.0, km:88.0, price:5500,  min:0,   max:0  },
  {id:9,  name:'Melas',             hp:6.0,  me:2.80, ndf:0.0,  nisasta:0.0,  km:75.0, price:8000,  min:0,   max:1  },
  {id:10, name:'Mineral Karışımı',  hp:0.0,  me:0.00, ndf:0.0,  nisasta:0.0,  km:98.0, price:12000, min:0.1, max:0.2},
  {id:11, name:'Sodyum Bikarbonat', hp:0.0,  me:0.00, ndf:0.0,  nisasta:0.0,  km:99.0, price:15000, min:0,   max:0.2},
  {id:12, name:'Bypass Yağ',        hp:0.0,  me:8.00, ndf:0.0,  nisasta:0.0,  km:99.0, price:35000, min:0,   max:0.5},
];

// ═══════════════════════ STATE ═══════════════════════

const S = {
  feeds:    clone(DEF_FEEDS),
  reqs:     clone(DEF_REQS),
  rations:  {sut:{}, kuru:{}, duve:{}, buzagi:{}, besi:{}},
  group:    'sut',
  mode:     'taze',   // 'taze' | 'km'
  fColl:    false,    // feeds collapsed
  mal: {sutFiyati:18.0, suruBuyuklugu:50, gunlukSut:30.0}
};

function clone(x){return JSON.parse(JSON.stringify(x))}

// ═══════════════════════ NUTRITION CALC ═══════════════════════

function calcNut(feeds, rationTaze){
  let km=0, hp=0, me=0, ndf=0, nis=0, cost=0;
  for(const f of feeds){
    const t=parseFloat(rationTaze[f.id]||0);
    if(t<=0) continue;
    const k=t*f.km/100;
    km+=k; hp+=k*f.hp/100; me+=k*f.me;
    ndf+=k*f.ndf/100; nis+=k*f.nisasta/100;
    cost+=t*f.price/1000;
  }
  return {
    km, cost,
    hp:  km>0 ? hp/km*100    : 0,
    me:  km>0 ? me/km        : 0,
    ndf: km>0 ? ndf/km*100   : 0,
    nisasta: km>0 ? nis/km*100 : 0
  };
}

function isOpt(act, req){
  const T=0.03;
  return (
    Math.abs(act.km-req.km)<=req.km*T &&
    act.hp     >= req.hp     *(1-T) &&
    act.me     >= req.me     *(1-T) &&
    act.ndf    >= req.ndf    *(1-T) &&
    act.nisasta>= req.nisasta*(1-T)
  );
}

// ═══════════════════════ OPTIMIZER ═══════════════════════

function optimize(reqs, feeds){
  const amt={};
  feeds.forEach(f=>{ amt[f.id]=f.min*f.km/100; });

  const maxKM = f => (f.max===0 ? 1e9 : f.max)*f.km/100;
  const minKM = f => f.min*f.km/100;

  function tot(){
    let km=0,hp=0,me=0,ndf=0,nis=0;
    for(const f of feeds){
      const k=amt[f.id];
      km+=k; hp+=k*f.hp/100; me+=k*f.me;
      ndf+=k*f.ndf/100; nis+=k*f.nisasta/100;
    }
    return{km,hp,me,ndf,nis};
  }

  function doSwap(a,b,delta){
    const canAdd=maxKM(a)-amt[a.id];
    const canRem=amt[b.id]-minKM(b);
    const actual=Math.min(delta,canAdd,canRem);
    if(actual<=1e-6) return 0;
    amt[a.id]+=actual; amt[b.id]-=actual;
    return actual;
  }

  // Step 1 – fill KM with cheapest
  const cheap=[...feeds].sort((a,b)=>a.price-b.price);
  for(const f of cheap){
    const t=tot();
    if(t.km>=reqs.km) break;
    const space=maxKM(f)-amt[f.id];
    const need=reqs.km-t.km;
    amt[f.id]+=Math.max(0,Math.min(space,need));
  }

  // Generic fix: swap to increase `key` (in KM kg) toward target
  function fixNut(getTarget, getActual, getGain, iterations){
    for(let i=0;i<iterations;i++){
      const t=tot();
      const target=getTarget(t);
      const actual=getActual(t);
      const deficit=target-actual;
      if(deficit<=target*0.01) break;

      const canAdd=feeds.filter(f=>maxKM(f)-amt[f.id]>1e-5).sort((a,b)=>b[getGain]-a[getGain]);
      const canRem=feeds.filter(f=>amt[f.id]-minKM(f)>1e-5);
      if(!canAdd.length||!canRem.length) break;

      const addF=canAdd[0];
      const remF=canRem.filter(f=>f.id!==addF.id).sort((a,b)=>a[getGain]-b[getGain])[0];
      if(!remF) break;

      const gain=(addF[getGain]-remF[getGain])*(getGain==='me'?1:0.01);
      if(gain<=0) break;

      const needed=deficit/gain;
      if(doSwap(addF,remF,needed)<1e-6) break;
    }
  }

  function fixHP(){
    for(let i=0;i<60;i++){
      const t=tot(); if(t.km===0) break;
      const tgt=reqs.hp/100*t.km, def=tgt-t.hp;
      if(def<=tgt*0.01) break;
      const ca=feeds.filter(f=>maxKM(f)-amt[f.id]>1e-5).sort((a,b)=>b.hp-a.hp);
      const cr=feeds.filter(f=>amt[f.id]-minKM(f)>1e-5);
      if(!ca.length||!cr.length) break;
      const aF=ca[0];
      const rF=cr.filter(f=>f.id!==aF.id).sort((a,b)=>a.hp-b.hp)[0];
      if(!rF) break;
      const gain=(aF.hp-rF.hp)/100; if(gain<=0) break;
      if(doSwap(aF,rF,def/gain)<1e-6) break;
    }
  }

  function fixME(){
    for(let i=0;i<60;i++){
      const t=tot(); if(t.km===0) break;
      const tgt=reqs.me*t.km, def=tgt-t.me;
      if(def<=tgt*0.01) break;
      const ca=feeds.filter(f=>maxKM(f)-amt[f.id]>1e-5).sort((a,b)=>b.me-a.me);
      const cr=feeds.filter(f=>amt[f.id]-minKM(f)>1e-5);
      if(!ca.length||!cr.length) break;
      const aF=ca[0];
      const rF=cr.filter(f=>f.id!==aF.id).sort((a,b)=>a.me-b.me)[0];
      if(!rF) break;
      const gain=aF.me-rF.me; if(gain<=0) break;
      if(doSwap(aF,rF,def/gain)<1e-6) break;
    }
  }

  function fixNDF(){
    for(let i=0;i<60;i++){
      const t=tot(); if(t.km===0) break;
      const tgt=reqs.ndf/100*t.km, def=tgt-t.ndf;
      if(def<=tgt*0.01) break;
      const ca=feeds.filter(f=>maxKM(f)-amt[f.id]>1e-5).sort((a,b)=>b.ndf-a.ndf);
      const cr=feeds.filter(f=>amt[f.id]-minKM(f)>1e-5);
      if(!ca.length||!cr.length) break;
      const aF=ca[0];
      const rF=cr.filter(f=>f.id!==aF.id).sort((a,b)=>a.ndf-b.ndf)[0];
      if(!rF) break;
      const gain=(aF.ndf-rF.ndf)/100; if(gain<=0) break;
      if(doSwap(aF,rF,def/gain)<1e-6) break;
    }
  }

  function fixNis(){
    for(let i=0;i<60;i++){
      const t=tot(); if(t.km===0) break;
      const tgt=reqs.nisasta/100*t.km, def=tgt-t.nis;
      if(def<=tgt*0.01) break;
      const ca=feeds.filter(f=>maxKM(f)-amt[f.id]>1e-5).sort((a,b)=>b.nisasta-a.nisasta);
      const cr=feeds.filter(f=>amt[f.id]-minKM(f)>1e-5);
      if(!ca.length||!cr.length) break;
      const aF=ca[0];
      const rF=cr.filter(f=>f.id!==aF.id).sort((a,b)=>a.nisasta-b.nisasta)[0];
      if(!rF) break;
      const gain=(aF.nisasta-rF.nisasta)/100; if(gain<=0) break;
      if(doSwap(aF,rF,def/gain)<1e-6) break;
    }
  }

  for(let pass=0;pass<4;pass++){ fixHP(); fixME(); fixNDF(); fixNis(); }

  const result={};
  for(const f of feeds){
    const taze=amt[f.id]/(f.km/100);
    result[f.id]=taze>0.001 ? parseFloat(taze.toFixed(3)) : 0;
  }
  return result;
}

// ═══════════════════════ FORMAT ═══════════════════════

const f2=(n,d=2)=>(n==null||isNaN(n)?'—':parseFloat(n).toFixed(d));
const sign=(n)=>(n>=0?'+':'')+n;

function dClass(diff,pct){
  if(Math.abs(pct)<=3) return 'dok';
  return diff>=0?'dpos':'dneg';
}

function statusHtml(act,req,isKM=false){
  if(req===0) return '';
  const pct=(act/req-1)*100;
  if(isKM){
    if(Math.abs(pct)<=5) return '<span class="sok">✓</span>';
    if(Math.abs(pct)<=12) return '<span class="swrn">⚠</span>';
    return '<span class="serr">✗</span>';
  }
  if(act>=req*0.97) return '<span class="sok">✓</span>';
  if(act>=req*0.90) return '<span class="swrn">⚠</span>';
  return '<span class="serr">✗</span>';
}

// ═══════════════════════ RENDER GROUP ═══════════════════════

function renderGroup(g){
  const el=document.getElementById('tc-'+g);
  const req=S.reqs[g], rat=S.rations[g], feeds=S.feeds, mode=S.mode;
  const act=calcNut(feeds,rat);
  const anyV=feeds.some(f=>parseFloat(rat[f.id]||0)>0);
  const opt=anyV&&isOpt(act,req);

  // Banner
  let bannerHtml='';
  if(anyV){
    if(opt) bannerHtml=`<div class="banner opt">🎯 Rasyon optimum — tüm besin değerleri hedef aralığında</div>`;
    else    bannerHtml=`<div class="banner apr">⚠️ Yaklaşık çözüm — bazı besin değerleri hedef aralığı dışında</div>`;
  }

  // Requirements
  const reqHtml=`
  <div class="reqs">
    <span class="reqs-lbl">İhtiyaçlar (NRC)</span>
    <div class="req-items">
      ${[
        {k:'km',lbl:'KM (kg/gün)',step:0.5},
        {k:'hp',lbl:'HP (%)',step:0.1},
        {k:'me',lbl:'ME (Mcal/kg)',step:0.01},
        {k:'ndf',lbl:'NDF (%)',step:0.5},
        {k:'nisasta',lbl:'Nişasta (%)',step:0.5}
      ].map(r=>`
      <div class="req-item">
        <span class="req-key">${r.lbl}</span>
        <input class="req-in" type="number" step="${r.step}" value="${req[r.k]}"
          onchange="updateReq('${g}','${r.k}',this.value)">
      </div>`).join('')}
    </div>
  </div>`;

  // Feeds table
  const fRows=feeds.map(f=>`
    <tr>
      <td class="nm"><input class="ci nm" value="${esc(f.name)}" onchange="updateFeed(${f.id},'name',this.value)"></td>
      <td><input class="ci" type="number" value="${f.hp}"       step="0.1"  onchange="updateFeed(${f.id},'hp',this.value)"></td>
      <td><input class="ci" type="number" value="${f.me}"       step="0.01" onchange="updateFeed(${f.id},'me',this.value)"></td>
      <td><input class="ci" type="number" value="${f.ndf}"      step="0.5"  onchange="updateFeed(${f.id},'ndf',this.value)"></td>
      <td><input class="ci" type="number" value="${f.nisasta}"  step="0.5"  onchange="updateFeed(${f.id},'nisasta',this.value)"></td>
      <td><input class="ci" type="number" value="${f.km}"       step="0.5"  onchange="updateFeed(${f.id},'km',this.value)"></td>
      <td><input class="ci" type="number" value="${f.price}"    step="100"  onchange="updateFeed(${f.id},'price',this.value)"></td>
      <td><input class="ci" type="number" value="${f.min}"      step="0.1"  onchange="updateFeed(${f.id},'min',this.value)"></td>
      <td><input class="ci" type="number" value="${f.max}"      step="0.1"  onchange="updateFeed(${f.id},'max',this.value)" title="0 = Sınırsız"></td>
      <td style="text-align:center"><button class="btn-del" onclick="delFeed(${f.id})">✕</button></td>
    </tr>`).join('');

  const feedsHtml=`
  <div class="card">
    <div class="card-hd" onclick="toggleFeeds()">
      <h3>📋 Hammadde Tablosu <span style="color:var(--dim);font-weight:400">(${feeds.length} kalem · Max=0 → Sınırsız)</span></h3>
      <span class="arr ${S.fColl?'':'open'}">▼</span>
    </div>
    <div class="card-body ${S.fColl?'coll':''}">
      <div class="twrap">
        <table class="dt">
          <thead><tr>
            <th class="lft">Hammadde</th>
            <th>HP%</th><th>ME</th><th>NDF%</th><th>Niş%</th><th>KM%</th>
            <th>₺/ton</th><th>Min kg</th><th>Max kg</th><th></th>
          </tr></thead>
          <tbody>${fRows}</tbody>
        </table>
      </div>
      <div class="card-foot">
        <button class="btn btn-g" onclick="addFeed()">+ Hammadde Ekle</button>
        <button class="btn btn-g" onclick="resetFeeds()">↺ Varsayılana Dön</button>
      </div>
    </div>
  </div>`;

  // Ration table
  let totKM=0, totCost=0;
  feeds.forEach(f=>{const t=parseFloat(rat[f.id]||0);totKM+=t*f.km/100;totCost+=t*f.price/1000;});

  const rRows=feeds.map(f=>{
    const taze=parseFloat(rat[f.id]||0);
    const kmKg=taze*f.km/100;
    const dispVal=mode==='taze'?taze:kmKg;
    const otherVal=mode==='taze'?kmKg:taze;
    const hasV=taze>0;
    return `
    <tr>
      <td class="nm">${esc(f.name)}</td>
      <td style="color:var(--muted);font-size:12px">${f.min}—${f.max===0?'∞':f.max}</td>
      <td>
        <input class="ra ${hasV?'hv':''}" type="number" min="0" step="0.1"
          value="${dispVal>0?f2(dispVal,2):''}" placeholder="0"
          onchange="updateAmt('${g}',${f.id},this.value,'${mode}')">
      </td>
      <td style="color:var(--muted);font-size:12px">${otherVal>0?f2(otherVal,2):'—'}</td>
      <td style="color:var(--gold);font-size:12px">${taze>0?'₺'+f2(taze*f.price/1000,1):'—'}</td>
    </tr>`;
  }).join('');

  const rTotalRow=`
  <tr class="trow">
    <td class="nm">TOPLAM</td>
    <td></td>
    <td style="color:var(--glow)">${f2(mode==='taze'?feeds.reduce((s,f)=>s+parseFloat(rat[f.id]||0),0):totKM,2)}</td>
    <td style="color:var(--muted);font-size:12px">${f2(mode==='taze'?totKM:feeds.reduce((s,f)=>s+parseFloat(rat[f.id]||0),0),2)}</td>
    <td style="color:var(--gold2)">₺${f2(totCost,1)}</td>
  </tr>`;

  const rHtml=`
  <div class="card">
    <div class="rctl">
      <h3>🌾 Rasyon Girişi</h3>
      <div class="tgl">
        <button class="${mode==='taze'?'act':''}" onclick="setMode('taze')">Taze kg</button>
        <button class="${mode==='km'?'act':''}" onclick="setMode('km')">KM kg</button>
      </div>
      <button class="btn btn-opt" onclick="runOpt('${g}')">🎯 Optimum Rasyonu Hesapla</button>
      <button class="btn btn-clr" onclick="clearRat('${g}')">🗑 Temizle</button>
    </div>
    <div class="twrap">
      <table class="dt">
        <thead><tr>
          <th class="lft">Hammadde</th>
          <th>Min—Max</th>
          <th>${mode==='taze'?'Taze kg':'KM kg'}</th>
          <th>${mode==='taze'?'KM kg':'Taze kg'}</th>
          <th>Maliyet</th>
        </tr></thead>
        <tbody>${rRows}${rTotalRow}</tbody>
      </table>
    </div>

  const PARAMS=[
    {lbl:'Kuru Madde',  key:'km',      unit:'kg/gün',  req:req.km,      act:act.km,      isKM:true, dp:2},
    {lbl:'Ham Protein', key:'hp',      unit:'%',       req:req.hp,      act:act.hp,      dp:1},
    {lbl:'ME Enerji',   key:'me',      unit:'Mcal/kg', req:req.me,      act:act.me,      dp:2},
    {lbl:'NDF',         key:'ndf',     unit:'%',       req:req.ndf,     act:act.ndf,     dp:1},
    {lbl:'Nişasta',     key:'nisasta', unit:'%',       req:req.nisasta, act:act.nisasta, dp:1},
  ];

  const resRows=PARAMS.map(p=>{
    const diff=p.act-p.req;
    const pct=p.req>0?diff/p.req*100:0;
    const dc=dClass(diff,pct);
    const icon=statusHtml(p.act,p.req,p.isKM||false);
    const actStr=anyV?f2(p.act,p.dp):'—';
    const diffStr=anyV?(diff>=0?'+':'')+f2(diff,p.dp):'—';
    const pctStr=anyV?(pct>=0?'+':'')+f2(pct,1)+'%':'—';
    return `
    <tr>
      <td class="nm">${p.lbl} <span class="u">(${p.unit})</span></td>
      <td>${f2(p.req,p.dp)}</td>
      <td>${actStr}</td>
      <td class="${anyV?dc:''}">${diffStr}</td>
      <td class="${anyV?dc:''}">${pctStr}</td>
      <td>${anyV?icon:''}</td>
    </tr>`;
  }).join('');

  const costRows=anyV?`
    <tr class="crow">
      <td class="nm">💰 Günlük Yem Maliyeti</td>
      <td colspan="4"></td>
      <td style="color:var(--gold2);font-size:16px">₺${f2(act.cost,1)}</td>
    </tr>
    <tr class="crow">
      <td class="nm">💰 Ton KM Başı Maliyet</td>
      <td colspan="5" style="text-align:right;color:var(--gold)">₺${act.km>0?f2(act.cost/act.km*1000,0):'—'} / ton KM</td>
    </tr>`:'';

  const resHtml=`
  <div class="card">
    ${bannerHtml}
    <div class="res-hd">
      <h3>📊 Besin Maddeleri Analizi</h3>
      ${anyV?`<span class="chip">₺${f2(act.cost,1)}/gün</span>`:''}
    </div>
    <div class="twrap">
      <table class="rt">
        <thead><tr>
          <th class="lft">Parametre</th>
          <th>İhtiyaç</th><th>Rasyon</th>
          <th>Fark</th><th>Sapma %</th><th>Durum</th>
        </tr></thead>
        <tbody>${resRows}${costRows}</tbody>
      </table>
    </div>
  </div>`;

  el.innerHTML=reqHtml+feedsHtml+rHtml+resHtml;
}

// ═══════════════════════ RENDER MALIYET ═══════════════════════

function renderMaliyet(){
  const m=S.mal;
  const act=calcNut(S.feeds, S.rations['sut']);
  const anyV=S.feeds.some(f=>parseFloat(S.rations.sut[f.id]||0)>0);

  const dCostHead=act.cost;
  const dCostSuru=dCostHead*m.suruBuyuklugu;
  const dRevHead=m.gunlukSut*m.sutFiyati;
  const dRevSuru=dRevHead*m.suruBuyuklugu;
  const dProfHead=dRevHead-dCostHead;
  const dProfSuru=dRevSuru-dCostSuru;
  const mCost=dCostSuru*30, mRev=dRevSuru*30, mProf=dProfSuru*30;
  const fmRatio=dRevHead>0?(dCostHead/dRevHead*100):0;

  const costItems=S.feeds.map(f=>{
    const t=parseFloat(S.rations.sut[f.id]||0);
    return{name:f.name, cost:t*f.price/1000};
  }).filter(x=>x.cost>0.001).sort((a,b)=>b.cost-a.cost);
  const totCost=costItems.reduce((s,x)=>s+x.cost,0);

  const bars=costItems.length>0?costItems.map(x=>{
    const pct=totCost>0?x.cost/totCost*100:0;
    return `
    <div class="bar-row">
      <div class="bar-lbl" title="${esc(x.name)}">${esc(x.name)}</div>
      <div class="bar-trk"><div class="bar-fill" style="width:${pct}%"></div></div>
      <div class="bar-pct">${f2(pct,1)}%</div>
      <div class="bar-val">₺${f2(x.cost,1)}</div>
    </div>`;
  }).join('')
  : `<div class="empty">Süt İneği rasyonunu girerek maliyet dağılımı oluşturun</div>`;

  const ratioColor=fmRatio<=35?'pos':fmRatio<=50?'':'neg';

  document.getElementById('tc-maliyet').innerHTML=`
  <div class="mgrid">
    <div class="card">
      <div class="card-hd" style="cursor:default"><h3>⚙️ Sürü Parametreleri</h3></div>
      <div class="card-body" style="padding:14px">
        <div class="form-row">
          <label class="form-lbl">Süt Fiyatı (₺/L)</label>
          <input class="form-in" type="number" step="0.5" value="${m.sutFiyati}" onchange="updMal('sutFiyati',this.value)">
        </div>
        <div class="form-row">
          <label class="form-lbl">Sürü Büyüklüğü (baş)</label>
          <input class="form-in" type="number" step="1" value="${m.suruBuyuklugu}" onchange="updMal('suruBuyuklugu',this.value)">
        </div>
        <div class="form-row">
          <label class="form-lbl">Günlük Süt Üretimi (L/baş)</label>
          <input class="form-in" type="number" step="1" value="${m.gunlukSut}" onchange="updMal('gunlukSut',this.value)">
        </div>
        <div class="info-box">ℹ️ Hesaplama Süt İneği rasyonunu baz alır. Rasyon girilmemişse maliyet sıfır görünür.</div>
        ${anyV?`
        <div style="margin-top:12px;padding:11px;background:var(--surf3);border-radius:6px;display:flex;align-items:center;gap:16px">
          <div>
            <div class="kpi-lbl">Yem/Süt Oranı</div>
            <div class="kpi-val ${ratioColor}" style="font-size:22px">${f2(fmRatio,1)}%</div>
          </div>
          <div style="font-size:13px;color:var(--muted)">≤35% ideal<br>35–50% kabul edilebilir<br>>50% kritik</div>
        </div>`:''}
      </div>
    </div>
    <div class="card">
      <div class="card-hd" style="cursor:default"><h3>📊 Hammadde Maliyet Dağılımı</h3></div>
      <div class="card-body" style="padding:14px">${bars}</div>
    </div>
  </div>

  <div class="kpis">
    <div class="kpi">
      <div class="kpi-lbl">Günlük Yem Maliyeti (Sürü)</div>
      <div class="kpi-val gld">₺${f2(dCostSuru,0)}</div>
      <div class="kpi-sub">₺${f2(dCostHead,1)} / baş / gün</div>
    </div>
    <div class="kpi">
      <div class="kpi-lbl">Günlük Süt Geliri (Sürü)</div>
      <div class="kpi-val pos">₺${f2(dRevSuru,0)}</div>
      <div class="kpi-sub">₺${f2(dRevHead,1)} / baş / gün</div>
    </div>
    <div class="kpi">
      <div class="kpi-lbl">Günlük Kâr (Sürü)</div>
      <div class="kpi-val ${dProfSuru>=0?'pos':'neg'}">₺${f2(dProfSuru,0)}</div>
      <div class="kpi-sub">₺${f2(dProfHead,1)} / baş / gün</div>
    </div>
    <div class="kpi">
      <div class="kpi-lbl">Aylık Yem Maliyeti</div>
      <div class="kpi-val gld">₺${f2(mCost,0)}</div>
      <div class="kpi-sub">30 gün × ${m.suruBuyuklugu} baş</div>
    </div>
    <div class="kpi">
      <div class="kpi-lbl">Aylık Süt Geliri</div>
      <div class="kpi-val pos">₺${f2(mRev,0)}</div>
      <div class="kpi-sub">${m.gunlukSut} L/gün × ${m.suruBuyuklugu} baş</div>
    </div>
    <div class="kpi">
      <div class="kpi-lbl">Aylık Kâr (Yem Bazlı)</div>
      <div class="kpi-val ${mProf>=0?'pos':'neg'}">₺${f2(mProf,0)}</div>
      <div class="kpi-sub">${mProf>=0?'✓ Kârlı':'⚠ Zararda'}</div>
    </div>
  </div>`;
}

// ═══════════════════════ RENDER ═══════════════════════

function render(){
  const g=S.group;
  if(g==='maliyet') renderMaliyet();
  else renderGroup(g);
}

// ═══════════════════════ ACTIONS ═══════════════════════

function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Tab switching
document.getElementById('tabs').addEventListener('click',e=>{
  const btn=e.target.closest('.tab-btn');
  if(!btn) return;
  const g=btn.dataset.g;
  S.group=g;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.g===g));
  document.querySelectorAll('.tc').forEach(tc=>tc.classList.remove('active'));
  document.getElementById('tc-'+g).classList.add('active');
  render();
});

function updateReq(g,k,v){
  S.reqs[g][k]=parseFloat(v)||0;
  render();
}

function updateFeed(id,k,v){
  const f=S.feeds.find(f=>f.id===id);
  if(!f) return;
  f[k]=k==='name'?v:(parseFloat(v)||0);
  render();
}

function delFeed(id){
  if(S.feeds.length<=1){alert('En az 1 hammadde olmalı!');return;}
  if(!confirm('Bu hammaddeyi silmek istediğinize emin misiniz?')) return;
  S.feeds=S.feeds.filter(f=>f.id!==id);
  GROUPS.forEach(g=>{delete S.rations[g][id];});
  render();
}

function addFeed(){
  S.feeds.push({id:NID++,name:'Yeni Hammadde',hp:10,me:2.50,ndf:20,nisasta:20,km:88,price:5000,min:0,max:0});
  S.fColl=false;
  render();
}

function resetFeeds(){
  if(!confirm('Hammadde tablosu varsayılana sıfırlansın mı? Tüm değişiklikler kaybolur.')) return;
  S.feeds=clone(DEF_FEEDS); NID=13; render();
}

function toggleFeeds(){
  S.fColl=!S.fColl; render();
}

function setMode(m){
  S.mode=m; render();
}

function updateAmt(g,id,v,mode){
  const f=S.feeds.find(f=>f.id===id);
  if(!f) return;
  const n=parseFloat(v)||0;
  S.rations[g][id]=mode==='taze'?n:(n/(f.km/100));
  render();
}

function clearRat(g){
  if(!confirm('Rasyon temizlensin mi?')) return;
  S.rations[g]={}; render();
}

function runOpt(g){
  const result=optimize(S.reqs[g], S.feeds);
  S.rations[g]=result;
  render();
}

function updMal(k,v){
  S.mal[k]=parseFloat(v)||0;
  renderMaliyet();
}

// ═══════════════════════ INIT ═══════════════════════

render();
</script>
